<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Il Menu — L'Arca Follonica</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    :root {
      /* Palette "Coastal Chic" più raffinata */
      --sky-light: #f0f8ff; /* AliceBlue, leggerissimo e luminoso */
      --sky-mid: #bce3f2;   /* Azzurro polvere per i bordi */
      --sky-deep: #005b96;  /* Blu marino elegante per i testi importanti */
      --text-main: #0a192f; /* Blu scurissimo quasi nero per i titoli */
      --text-muted: #4a5d73; /* Grigio-blu per le descrizioni */
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Jost', sans-serif; 
      background-color: var(--sky-light);
      background-image: radial-gradient(at 50% 0%, #ffffff 0px, transparent 75%);
      color: var(--text-main); 
      line-height: 1.6;
    }

    /* Header */
    .menu-header { text-align: center; padding: 60px 20px 30px; position: relative; }
    .back-link { position: absolute; top: 30px; left: 30px; color: var(--sky-deep); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; display: flex; align-items: center; gap: 8px;}
    .back-link:hover { color: #0369a1; }
    .menu-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 400; color: var(--text-main); line-height: 1; margin-bottom: 10px;}
    
    /* Filtri e Ricerca */
    .controls-wrapper { position: sticky; top: 0; background: rgba(240, 248, 255, 0.95); backdrop-filter: blur(10px); z-index: 100; padding: 20px 0; border-bottom: 1px solid rgba(0, 91, 150, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
    .controls { max-width: 900px; margin: 0 auto; padding: 0 20px; }
    
    .search-box { background: var(--white); border: 1px solid var(--sky-mid); padding: 12px 20px; border-radius: 30px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto;}
    .search-box input { border: none; outline: none; width: 100%; font-family: 'Jost', sans-serif; font-size: 1rem; background: transparent; color: var(--text-main);}
    
    /* Categorie modificate per andare a capo e mostrarsi tutte */
    .categories { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-bottom: 5px; }
    .cat-btn { background: var(--white); border: 1px solid var(--sky-mid); color: var(--sky-deep); padding: 8px 18px; border-radius: 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; font-weight: 500; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
    .cat-btn.active, .cat-btn:hover { background: var(--sky-deep); color: var(--white); border-color: var(--sky-deep); box-shadow: 0 4px 10px rgba(0, 91, 150, 0.2);}

    /* Layout Lista Menu a 2 colonne */
    .menu-container { max-width: 1000px; margin: 0 auto; padding: 20px 20px 80px; }
    
    .category-section { margin-top: 60px; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 400; color: var(--sky-deep); text-align: center; margin-bottom: 40px; position: relative; }
    .section-title::after { content: ''; display: block; width: 60px; height: 1px; background: var(--sky-deep); margin: 15px auto 0; }

    /* Modifica principale: Griglia a due colonne */
    .menu-list { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 30px 40px; 
    }
    
    .menu-item { display: flex; flex-direction: column; }
    .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .item-name { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; color: var(--text-main); line-height: 1.2; padding-right: 10px; }
    
    .item-dots { flex-grow: 1; border-bottom: 1px dotted var(--sky-mid); margin: 0 10px; position: relative; top: -5px; }
    
    .item-price { font-size: 1.1rem; font-weight: 500; color: var(--sky-deep); white-space: nowrap; }
    .item-desc { font-size: 0.95rem; color: var(--text-muted); font-style: italic; font-weight: 300; line-height: 1.4; }

    /* Footer */
    .menu-footer { text-align: center; padding: 50px 20px; font-size: 0.85rem; color: var(--text-muted); background: var(--white); border-top: 1px solid var(--sky-mid); }

    /* Responsive per mobile: torna a 1 colonna */
    @media (max-width: 768px) {
      .menu-list { grid-template-columns: 1fr; gap: 25px; }
      .item-header { flex-direction: column; align-items: flex-start; }
      .item-dots { display: none; }
      .item-price { margin-top: 4px; }
      .menu-header h1 { font-size: 2.8rem; }
      .back-link { top: 20px; left: 20px; }
    }
  </style>
</head>
<body>

  <header class="menu-header">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
    <h1>La Carta</h1>
    <p style="color: var(--text-muted); font-style: italic;">Tradizione di mare a Follonica</p>

  <div class="controls-wrapper">

        <input type="text" id="searchInput" placeholder="Cerca un piatto o un ingrediente..." onkeyup="filterMenu()">
      </div>
      <div class="categories" id="cat-container"></div>
    </div>
  </div>

  <main class="menu-container" id="menuContent"></main>

  <footer class="menu-footer">

    <p style="margin-top: 15px;">Per informazioni su sostanze e allergeni è possibile consultare l'apposita documentazione fornita dal personale.</p>
  </footer>

      { cat: 'Antipasti', name: 'Moscardini in umido', price: '€ 15,00', desc: 'Moscardini stufati al pomodoro' },

      { cat: 'Primi', name: 'Tagliolino allo scoglio', price: '€ 16,00', desc: 'Totani*, gamberetti*, cozze' },

      { cat: 'Vini', name: 'Vermentino Biologico Doc', price: '€ 18,00', desc: 'La Cura - Massa Marittima. Sentori dolci e piacevole freschezza' },
      { cat: 'Vini', name: 'Vino della casa Trebbiano', price: 'Da € 4,00', desc: 'Bicchiere € 4 / Mezzo litro € 7 / 1 Litro € 12' },
      { cat: 'Vini', name: 'Vino della casa Rosso', price: 'Da € 4,00', desc: 'Azienda La Cura. Bicchiere € 4 / Mezzo litro € 7 / 1 Litro € 12' },
      
      { cat: 'Bevande', name: 'Birra alla spina (40cl)', price: '€ 5,00', desc: 'Lowenbrau pils' },
      { cat: 'Bevande', name: 'Birra in bottiglia (33 cl)', price: '€ 5,00', desc: 'Corona, Leffe, Hoegaarden, Ichnusa, Beck\'s Zero' },
      { cat: 'Bevande', name: 'Bevande in lattina', price: '€ 3,50', desc: 'Coca Cola, Fanta, Sprite, The, Succhi' },
      { cat: 'Bevande', name: 'Acqua', price: '€ 2,50', desc: 'Naturale o gassata (75 cl)' },
      { cat: 'Bevande', name: 'Caffè', price: '€ 2,00', desc: 'Espresso' },
      { cat: 'Bevande', name: 'Grappa', price: 'Da € 4,00', desc: 'Grappa € 4,00 / Grappa barricata € 7,00' },
      { cat: 'Bevande', name: 'Amari e Superalcolici', price: 'Da € 5,00', desc: 'Amari € 5,00 / Superalcolici € 7,00' }
    ];

    const order = ['Antipasti', 'Primi', 'Secondi', 'Pizze Rosse', 'Pizze Bianche', 'Contorni', 'Dolci', 'Vini', 'Bevande'];

    function initMenu() {
      const catContainer = document.getElementById('cat-container');
      catContainer.innerHTML = `<button class="cat-btn active" onclick="filterCat('all')">Tutti</button>`;
      order.forEach(cat => {
        catContainer.innerHTML += `<button class="cat-btn" onclick="filterCat('${cat}')">${cat}</button>`;
      });
      renderMenu(fullMenu);
    }

    function renderMenu(items) {
      const container = document.getElementById('menuContent');
      container.innerHTML = '';
      
      const grouped = items.reduce((acc, obj) => {
        acc[obj.cat] = acc[obj.cat] || [];
        acc[obj.cat].push(obj);
        return acc;
      }, {});

      order.forEach(cat => {
        if (grouped[cat] && grouped[cat].length > 0) {
          let section = `<section class="category-section" id="${cat.replace(/\s+/g, '-').toLowerCase()}">
                          <h2 class="section-title">${cat}</h2>
                          <div class="menu-list">`;
          grouped[cat].forEach(item => {
            section += `
              <div class="menu-item">
                <div class="item-header">
                  <span class="item-name">${item.name}</span>
                  <div class="item-dots"></div>
                  <span class="item-price">${item.price}</span>
                </div>
                <p class="item-desc">${item.desc}</p>
              </div>
            `;
          });
          section += `</div></section>`;
          container.innerHTML += section;
        }
      });
    }

    function filterMenu() {
      const s = document.getElementById('searchInput').value.toLowerCase();
      renderMenu(fullMenu.filter(i => i.name.toLowerCase().includes(s) || i.desc.toLowerCase().includes(s)));
    }

    function filterCat(cat) {
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.toggle('active', b.innerText.toLowerCase() === cat.toLowerCase() || (cat === 'all' && b.innerText === 'TUTTI'));
      });
      renderMenu(cat === 'all' ? fullMenu : fullMenu.filter(i => i.cat === cat));
      
      if (cat !== 'all') {
         window.scrollTo({ top: document.querySelector('.controls-wrapper').offsetTop, behavior: 'smooth' });
      }
    }

    initMenu();
  </script>
</body>
</html>
