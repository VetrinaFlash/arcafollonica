<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Menù Digitale — L'Arca Follonica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500;600&family=Jost:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    :root {
      --gold: #c9a84c; --dark: #070a13; --dark2: #0d121f;
      --white: #f5f0e8; --border: rgba(201, 168, 76, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Jost', sans-serif; background: var(--dark); color: var(--white); line-height: 1.6; }
    .menu-header { padding: 60px 25px 30px; text-align: center; background: linear-gradient(to bottom, #101628, var(--dark)); position: relative; }
    .back-link { position: absolute; top: 30px; left: 25px; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; }
    .menu-header h1 { font-family: 'Cormorant Garamond'; font-size: 3.5rem; color: var(--gold); font-weight: 300; }
    .controls { max-width: 900px; margin: 0 auto 40px; padding: 0 25px; }
    .search-box { background: var(--dark2); border: 1px solid var(--border); padding: 15px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
    .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1rem; }
    .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; white-space: nowrap; scrollbar-width: none; }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn { background: transparent; border: 1px solid var(--border); color: var(--white); padding: 8px 20px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
    .cat-btn.active, .cat-btn:hover { background: var(--gold); color: var(--dark); border-color: var(--gold); }
    .menu-container { max-width: 1200px; margin: 0 auto; padding: 0 25px 100px; }
    .section-title { font-family: 'Cormorant Garamond'; font-size: 2.2rem; color: var(--gold); margin: 60px 0 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-transform: capitalize; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .item-card { background: var(--dark2); padding: 22px; border-radius: 4px; border: 1px solid transparent; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
    .item-card:hover { border-color: var(--gold); transform: translateY(-3px); }
    .item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .item-name { font-family: 'Cormorant Garamond'; font-size: 1.3rem; font-weight: 500; color: var(--white); flex: 1; padding-right: 15px; line-height: 1.2; }
    .item-price { color: var(--gold); font-weight: 600; font-size: 1.1rem; white-space: nowrap; }
    .item-desc { font-size: 0.8rem; color: #8a9bb8; font-weight: 300; font-style: italic; margin-top: 8px; }
    .menu-footer { text-align: center; padding: 60px 25px; opacity: 0.6; font-size: 0.85rem; border-top: 1px solid var(--border); background: var(--dark2); }
    
    @media (max-width: 600px) {
      .menu-header h1 { font-size: 2.8rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="menu-header">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
    <h1>Menù L'Arca</h1>
    <p style="opacity: 0.6; font-size: 0.9rem; margin-top: 10px;">Tradizione di mare a Follonica</p>
  </header>

  <div class="controls">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass" style="color: var(--gold)"></i>
      <input type="text" id="searchInput" placeholder="Cerca piatti o ingredienti (es. Vongole, Senza Glutine...)" onkeyup="filterMenu()">
    </div>
    <div class="categories">
      <button class="cat-btn active" onclick="filterCat('all')">Tutti</button>
      <button class="cat-btn" onclick="filterCat('Antipasti')">Antipasti</button>
      <button class="cat-btn" onclick="filterCat('Primi')">Primi</button>
      <button class="cat-btn" onclick="filterCat('Secondi')">Secondi</button>
      <button class="cat-btn" onclick="filterCat('Pizze Rosse')">Pizze Rosse</button>
      <button class="cat-btn" onclick="filterCat('Pizze Bianche')">Pizze Bianche</button>
      <button class="cat-btn" onclick="filterCat('Contorni')">Contorni</button>
      <button class="cat-btn" onclick="filterCat('Dolci')">Dolci</button>
      <button class="cat-btn" onclick="filterCat('Vini')">Vini</button>
      <button class="cat-btn" onclick="filterCat('Bevande')">Bar</button>
    </div>
  </div>

  <main class="menu-container" id="menuContent"></main>

  <footer class="menu-footer">
    <p><strong>Coperto e servizio: € 2,50</strong></p>
    <p style="margin-top: 15px;">* Prodotto congelato all'origine.</p>
    <p>Per informazioni su sostanze e allergeni è possibile consultare l'apposita documentazione che verrà fornita, a richiesta, dal personale di servizio.</p>
  </footer>

      { cat: 'Antipasti', name: 'Acciughe con burrata', price: '€ 15,00', desc: 'Acciughe fresche e burrata' },

      // VINI E BEVANDE
      { cat: 'Vini', name: 'Vermentino Biologico Doc', price: '€ 18,00', desc: 'La Cura - Massa Marittima. Sentori dolci e piacevole freschezza' },
      { cat: 'Vini', name: 'Vino della casa Trebbiano (Bianco)', price: 'Da € 4,00', desc: 'Bicchiere € 4 / Mezzo litro € 7 / 1 Litro € 12' },
      { cat: 'Vini', name: 'Vino della casa Rosso', price: 'Da € 4,00', desc: 'Azienda La Cura. Bicchiere € 4 / Mezzo litro € 7 / 1 Litro € 12' },

      { cat: 'Bevande', name: 'Birra in bottiglia (33 cl)', price: '€ 5,00', desc: 'Corona, Leffe, Hoegaarden, Ichnusa, Beck\'s Zero' },
      { cat: 'Bevande', name: 'Bevande in lattina (33 cl)', price: '€ 3,50', desc: 'Coca Cola, Fanta, Sprite, The, Succhi' },

      { cat: 'Bevande', name: 'Grappa', price: 'Da € 4,00', desc: 'Grappa € 4,00 / Grappa barricata € 7,00' },
      { cat: 'Bevande', name: 'Amari e Superalcolici', price: 'Da € 5,00', desc: 'Amari € 5,00 / Superalcolici € 7,00' }
    ];

    function renderMenu(items) {
      const container = document.getElementById('menuContent');
      container.innerHTML = '';
      
      const order = ['Antipasti', 'Primi', 'Secondi', 'Pizze Rosse', 'Pizze Bianche', 'Contorni', 'Dolci', 'Vini', 'Bevande'];
      
      const grouped = items.reduce((acc, obj) => {
        acc[obj.cat] = acc[obj.cat] || [];
        acc[obj.cat].push(obj);
        return acc;
      }, {});

      order.forEach(cat => {
        if (grouped[cat] && grouped[cat].length > 0) {
          let section = `<section id="${cat.replace(/\s+/g, '-').toLowerCase()}">
                          <h2 class="section-title">${cat}</h2>
                          <div class="grid">`;
          grouped[cat].forEach(item => {
            section += `<div class="item-card">
                          <div class="item-top">
                            <h3 class="item-name">${item.name}</h3>
                            <span class="item-price">${item.price}</span>
                          </div>
                          <p class="item-desc">${item.desc}</p>
                        </div>`;
          });
          section += `</div></section>`;
          container.innerHTML += section;
        }
      });
    }

    function filterMenu() {
      const s = document.getElementById('searchInput').value.toLowerCase();
      renderMenu(fullMenu.filter(i => i.name.toLowerCase().includes(s) || i.desc.toLowerCase().includes(s)));
    }

    function filterCat(cat) {
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.toggle('active', b.innerText.toLowerCase() === cat.toLowerCase() || (cat === 'all' && b.innerText === 'TUTTI'));
      });
      renderMenu(cat === 'all' ? fullMenu : fullMenu.filter(i => i.cat === cat));
    }

    // Init
    renderMenu(fullMenu);
  </script>
</body>
</html>
